name: Build Debug APK

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Works whether the project is at the repo root or in a `pinboard-keyboard/`
      # subfolder. Uses the Gradle wrapper if present, otherwise downloads
      # Gradle 8.11.1 directly so the build never fails due to a missing
      # wrapper jar.
      - name: Assemble debug APK
        run: |
          if [ -d "pinboard-keyboard" ]; then
            cd pinboard-keyboard
          fi
          chmod +x ./gradlew 2>/dev/null || true
          if [ -f "./gradlew" ] && [ -f "./gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "Using project Gradle wrapper..."
            ./gradlew assembleDebug --no-daemon
          else
            echo "Wrapper not found. Downloading Gradle 8.11.1..."
            wget -q https://services.gradle.org/distributions/gradle-8.11.1-bin.zip
            unzip -q gradle-8.11.1-bin.zip
            ./gradle-8.11.1/bin/gradle assembleDebug --no-daemon
          fi

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pinboard-keyboard-debug-apk
          path: "**/build/outputs/apk/debug/*.apk"
          if-no-files-found: error
